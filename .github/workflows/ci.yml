name: CI — Validar Build y Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-jwt-secret-123

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test

      - name: Compilar TypeScript (Build)
        run: npm run build

      - name: Verificar que dist/ existe
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: no se generó la carpeta dist/"
            exit 1
          fi
          echo "✅ Build exitoso. Archivos generados:"
          ls -la dist/
